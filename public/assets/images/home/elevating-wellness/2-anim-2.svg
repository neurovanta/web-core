<svg xmlns="http://www.w3.org/2000/svg" width="355" height="347" viewBox="0 0 355 347" fill="none">
<style>
.p  { fill: none; stroke: #51463E; stroke-width: 2; }
.r  { stroke-linecap: round; }
.s  { stroke-linecap: square; }

/* Total cycle: 1.6s hold + instant vanish + 5.5s draw + hold to loop
   Total: 7.1s
   Hold:   0%  → 22.53%   (1.6s)
   Vanish: 22.53% → 22.54% (instant)
   walls:  22.54% → 40%
   brackets: 40% → 52%
   flame:  52% → 59.5%
   hold:   59.5% → 100% */

@keyframes d-wall {
  0%      { stroke-dashoffset: 0 }
  22.53%  { stroke-dashoffset: 0 }
  22.54%  { stroke-dashoffset: var(--len) }
  40%     { stroke-dashoffset: 0 }
  100%    { stroke-dashoffset: 0 }
}
@keyframes d-bracket {
  0%      { stroke-dashoffset: 0 }
  22.53%  { stroke-dashoffset: 0 }
  22.54%  { stroke-dashoffset: var(--len) }
  40%, 52%{ stroke-dashoffset: var(--len) }
  59.5%   { stroke-dashoffset: 0 }
  100%    { stroke-dashoffset: 0 }
}
@keyframes d-flame {
  0%      { stroke-dashoffset: 0 }
  22.53%  { stroke-dashoffset: 0 }
  22.54%  { stroke-dashoffset: 800 }
  40%, 59.5% { stroke-dashoffset: 800 }
  67%     { stroke-dashoffset: 0 }
  100%    { stroke-dashoffset: 0 }
}

.aw1 { --len: 285; stroke-dasharray: 285; stroke-dashoffset: 0; animation: d-wall    7.1s linear infinite; }
.aw2 { --len: 61;  stroke-dasharray: 61;  stroke-dashoffset: 0; animation: d-wall    7.1s linear infinite; }
.aw3 { --len: 58;  stroke-dasharray: 58;  stroke-dashoffset: 0; animation: d-wall    7.1s linear infinite; }
.aw4 { --len: 286; stroke-dasharray: 286; stroke-dashoffset: 0; animation: d-wall    7.1s linear infinite; }
.ab1 { --len: 195; stroke-dasharray: 195; stroke-dashoffset: 0; animation: d-bracket 7.1s linear infinite; }
.ab2 { --len: 195; stroke-dasharray: 195; stroke-dashoffset: 0; animation: d-bracket 7.1s linear infinite; }
.af  { stroke-dasharray: 800; stroke-dashoffset: 0;             animation: d-flame   7.1s linear infinite; }
</style>

